# options
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "screen-256color"
set -g mouse on
set-window-option -g mode-keys vi

# keymaps 
set -g prefix C-a

bind-key C-a send-prefix
unbind-key C-b

unbind %
bind = split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, attached-clients, network-vpn, weather, time, spotify-tui, kubernetes-context, synchronize-panes
set -g @dracula-plugins "kubernetes-context network"
#
# available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green, orange, red, pink, yellow
set -g @dracula-network-colors "orange dark_gray"
set -g @dracula-kubernetes-context-colors "cyan dark_gray"

# it can accept `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, `window`, or any character. 
set -g @dracula-show-left-icon session

# initialize tmp (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
